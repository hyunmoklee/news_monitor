name: News Crawler & Dashboard Monitor

on:
  schedule:
    # Run daily at 00:00 UTC (09:00 KST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Required to push database and dashboard changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper git tracking

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Cache pip dependencies for faster subsequent runs

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers and System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Run News Crawler
        run: |
          python run.py

      - name: Build Web Dashboard
        run: |
          python build_dashboard.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the changed files
          # Note: We track news_monitor.db to persist crawled history across runs
          git add news_monitor.db news_report_*.md docs/index.html
          
          # Commit only if there are modified/new files staged
          if git diff --cached --quiet; then
            echo "No new news articles crawled today. Dashboard is already up-to-date."
          else
            git commit -m "Auto-update: news database and dashboard [skip ci]"
            git push origin HEAD
          fi
